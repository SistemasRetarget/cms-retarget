name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://puebloladehesa.cl
          DATABASE_URL: postgresql://news:news@localhost:5432/news_db
          PAYLOAD_SECRET: ci-build-secret-not-for-production

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: news_db
          POSTGRES_USER: news
          POSTGRES_PASSWORD: news
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U news"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright + Chrome
        run: npx playwright install --with-deps chrome
      - name: Run tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://news:news@localhost:5432/news_db
          PAYLOAD_SECRET: ci-test-secret-not-for-production
          NEXT_PUBLIC_WHATSAPP_NUMBER: "56912345678"
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        run: |
          npm i -g @lhci/cli@0.14.x
          lhci autorun || echo "LHCI non-blocking warnings"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
